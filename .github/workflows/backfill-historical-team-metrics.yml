name: Backfill Historical Team Metrics

on:
  workflow_dispatch:
    inputs:
      end_season:
        description: "Last season to backfill (YYYYYYYY), e.g. 20242025"
        required: true
        default: "20242025"
      num_seasons:
        description: "How many seasons to backfill ending at end_season"
        required: false
        default: "5"
      start_date:
        description: "Start date YYYY-MM-DD (optional; only used when num_seasons=1)"
        required: false
        default: ""
      end_date:
        description: "End date YYYY-MM-DD (optional; only used when num_seasons=1)"
        required: false
        default: ""
      max_games_per_season:
        description: "Max games to process per season (0 = no limit)"
        required: false
        default: "250"
      cache_raw:
        description: "Cache raw gamecenter payloads (true/false)"
        required: false
        default: "false"
      playoff_teams_only:
        description: "Only store RS rows for teams in that season's playoff bracket (true/false)"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backfill (multi-season)
        run: |
          set -e
          END_SEASON="${{ inputs.end_season }}"
          NUM_SEASONS="${{ inputs.num_seasons }}"
          MAX_GAMES="${{ inputs.max_games_per_season }}"
          START="${{ inputs.start_date }}"
          END="${{ inputs.end_date }}"
          CACHE_RAW="${{ inputs.cache_raw }}"
          PLAYOFF_ONLY="${{ inputs.playoff_teams_only }}"

          END_START_YEAR="${END_SEASON:0:4}"
          if ! [[ "$END_START_YEAR" =~ ^[0-9]{4}$ ]]; then
            echo "Invalid end_season: $END_SEASON"
            exit 1
          fi

          if ! [[ "$NUM_SEASONS" =~ ^[0-9]+$ ]]; then
            echo "Invalid num_seasons: $NUM_SEASONS"
            exit 1
          fi

          START_YEAR=$((10#$END_START_YEAR - (10#$NUM_SEASONS - 1)))
          if [ "$START_YEAR" -lt 1917 ]; then
            echo "Refusing to backfill before 1917. Computed start_year=$START_YEAR"
            exit 1
          fi

          echo "Backfilling seasons with start years $START_YEAR..$END_START_YEAR"

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"

          for (( y=$START_YEAR; y<=10#$END_START_YEAR; y++ )); do
            SEASON="$(printf "%04d%04d" "$y" "$((y+1))")"
            echo ""
            echo "=== Backfill season $SEASON ==="

            ARGS="--season $SEASON --max-games $MAX_GAMES"
            if [ "$NUM_SEASONS" = "1" ] && [ -n "$START" ] && [ -n "$END" ]; then
              ARGS="$ARGS --start-date $START --end-date $END"
            fi
            if [ "$CACHE_RAW" = "true" ]; then
              ARGS="$ARGS --cache-raw"
            fi
            if [ "$PLAYOFF_ONLY" = "true" ]; then
              ARGS="$ARGS --playoff-teams-only"
            fi
            ARGS="$ARGS --log-each-game"

            python3 scripts/backfill_historical_team_metrics.py $ARGS
            echo "=== Workflow: finished backfill step for season ${SEASON} ==="

            # Persist after each season so cancel/timeout does not lose prior seasons.
            git add -A data/historical || true
            if ! git diff --staged --quiet; then
              git commit -m "data: historical backfill ${SEASON} [skip ci]"
              git pull --rebase origin main
              git push origin main
            else
              echo "No new data to commit for ${SEASON} (already up to date)."
            fi
          done

