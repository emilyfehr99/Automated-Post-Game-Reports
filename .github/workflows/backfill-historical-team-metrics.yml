name: Backfill Historical Team Metrics

on:
  workflow_dispatch:
    inputs:
      season:
        description: "Season (YYYYYYYY), e.g. 20222023"
        required: true
        default: "20222023"
      start_date:
        description: "Start date YYYY-MM-DD (optional)"
        required: false
        default: ""
      end_date:
        description: "End date YYYY-MM-DD (optional)"
        required: false
        default: ""
      max_games:
        description: "Max games to process this run (0 = no limit)"
        required: false
        default: "250"
      cache_raw:
        description: "Cache raw gamecenter payloads (true/false)"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backfill chunk
        run: |
          set -e
          SEASON="${{ inputs.season }}"
          MAX_GAMES="${{ inputs.max_games }}"
          START="${{ inputs.start_date }}"
          END="${{ inputs.end_date }}"
          CACHE_RAW="${{ inputs.cache_raw }}"

          ARGS="--season $SEASON --max-games $MAX_GAMES"
          if [ -n "$START" ] && [ -n "$END" ]; then
            ARGS="$ARGS --start-date $START --end-date $END"
          fi
          if [ "$CACHE_RAW" = "true" ]; then
            ARGS="$ARGS --cache-raw"
          fi

          python3 scripts/backfill_historical_team_metrics.py $ARGS

      - name: Commit and push results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"

          git add -A data/historical || true

          if ! git diff --staged --quiet; then
            git commit -m "data: backfill historical team metrics (${{ inputs.season }}) [skip ci]"
            git push origin main
          else
            echo "No changes to commit."
          fi

