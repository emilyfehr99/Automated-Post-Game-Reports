name: Daily NHL Predictions with Edge Data

concurrency:
  group: daily-nhl-predictions
  cancel-in-progress: false

on:
  schedule:
    # 5:30am Central Time (ensures predictions are ready around 6:00am given GitHub cron delays)
    - cron: '30 10 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Set true if you explicitly want model binaries committed (avoids frequent conflicts)
      PUSH_MODEL_ARTIFACTS: "false"
    steps:
      - name: Check Season Resume Date
        run: |
          current_date=$(date +%Y-%m-%d)
          target_date="2026-02-25"
          if [[ "$current_date" < "$target_date" ]]; then
            echo "⏸️  Olympic Break: Current date $current_date is before resume date $target_date."
            echo "Skipping workflow."
            # Exit with success to avoid failure notification, or error to cancel. 
            # Using exit 0 (success) effectively skips subsequent steps if we put this first,
            # BUT we need to conditionally run the rest. 
            # Easier way: Set an output and use `if` on subsequent steps, OR just exit 0 and stop.
            # However, steps run sequentially. To stop the workflow successfully we can't just exit 0.
            # We will use gh run cancel to stop it "neutral" or just exit 78 (neutral in some contexts) 
            # or simply fail (exit 1) if we want to be sure nothing else runs, but that sends failure email.
            # Best approach: set an env var and use it in `if` condition for all other steps? Too verbose.
            # Alternative: Exit 1 to fail? No.
            # Let's just exit 0 and use a hack? No.
            # Actually, `gh run cancel` requires a token.
            # Let's use the `if` condition on the job level? No, `on` doesn't support date logic.
            # Let's just let it run but do nothing? 
            # We can use circleci-style "halt"? No.
            # Let's just exit 1 (failure) but that's annoying.
            # How about we just dont run anything else?
            # We can set a step output `should_run` and check it in every other step.
            echo "should_run=false" >> $GITHUB_OUTPUT
          else
            echo "✅ Season Resumed!"
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi
        id: check_date

      - name: Checkout
        if: steps.check_date.outputs.should_run == 'true'
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        if: steps.check_date.outputs.should_run == 'true'
        id: setup_python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Cache pip
        if: steps.check_date.outputs.should_run == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-py310-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-py310-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        if: steps.check_date.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install pytz requests pandas numpy beautifulsoup4 python-dateutil reportlab pillow matplotlib scikit-learn seaborn xgboost lightgbm pytest

      - name: Check time window
        if: steps.check_date.outputs.should_run == 'true'
        run: |
          python3 -c "
          import pytz
          from datetime import datetime
          ct = pytz.timezone('US/Central')
          now_ct = datetime.now(ct)
          print('Now (CT):', now_ct.strftime('%Y-%m-%d %H:%M:%S %Z'))
          print('Running daily predictions workflow...')
          "

      - name: Scrape Edge data
        if: steps.check_date.outputs.should_run == 'true'
        run: |
          echo "🏒 SCRAPING NHL EDGE DATA"
          echo "Current directory: $(pwd)"
          echo "Contents:"
          ls -la
          echo "Looking for scraper:"
          find . -name "daily_edge_data_scraper.py" -type f
          echo "Running scraper:"
          PYTHONPATH=".:models:analyzers:utils:scrapers" python3 scrapers/daily_edge_data_scraper.py

      - name: Validate edge data exists
        if: steps.check_date.outputs.should_run == 'true'
        run: |
          if [ -f "data/nhl_edge_data.json" ]; then
            echo "✅ Edge data file created successfully in data/"
            ls -l data/nhl_edge_data.json
          else
            echo "❌ Edge data file not found in data/" && exit 1
          fi

      - name: Generate real team stats
        if: steps.check_date.outputs.should_run == 'true'
        run: |
          echo "📊 GENERATING REAL TEAM STATS"
          echo "Current directory: $(pwd)"
          echo "Running team stats generator..."
          PYTHONPATH=".:models:analyzers:utils:scrapers" python3 utils/generate_real_team_stats.py
          echo "✅ Team stats generation complete"
          
          # Check if file was created (normalized location)
          if [ -f "data/season_2025_2026_team_stats.json" ]; then
            echo "✅ Team stats file created in data/"
            ls -lh data/season_2025_2026_team_stats.json
          else
            echo "❌ Team stats file not found in data/" && exit 1
          fi

      - name: Update game outcomes
        if: steps.check_date.outputs.should_run == 'true'
        id: outcomes
        run: |
          echo "📝 UPDATING PAST GAME OUTCOMES"
          # Update outcomes, emit OUTCOMES_UPDATED=N, and persist to step output.
          set -e
          PYTHONPATH=".:models:analyzers:utils:scrapers" python3 utils/update_game_outcomes.py | tee /tmp/outcomes.log
          updated="$(python3 -c "import re; from pathlib import Path; m=re.search(r'OUTCOMES_UPDATED=(\\d+)', Path('/tmp/outcomes.log').read_text()); print(int(m.group(1)) if m else 0)")"
          echo "outcomes_updated=${updated}" >> "$GITHUB_OUTPUT"

      - name: One-time backfill events logs (if missing)
        if: steps.check_date.outputs.should_run == 'true'
        run: |
          if [ ! -f "data/prediction_events.jsonl" ] && [ -f "data/win_probability_predictions_v2.json" ]; then
            PYTHONPATH=".:models:analyzers:utils:scrapers" python3 utils/backfill_events_from_legacy_json.py
            PYTHONPATH=".:models:analyzers:utils:scrapers" python3 utils/compact_event_logs.py
            PYTHONPATH=".:models:analyzers:utils:scrapers" python3 utils/build_predictions_history_view.py
          fi

      - name: Compact events logs
        if: steps.check_date.outputs.should_run == 'true'
        run: |
          PYTHONPATH=".:models:analyzers:utils:scrapers" python3 utils/compact_event_logs.py

      - name: Retrain XGBoost Model
        if: steps.check_date.outputs.should_run == 'true' && steps.outcomes.outputs.outcomes_updated != '0'
        run: |
          echo "🧠 RETRAINING MODEL WITH LATEST RESULTS"
          # Capture baseline metrics (from repo checkout) for regression guardrails.
          if [ -f "model_metrics.json" ]; then
            cp model_metrics.json /tmp/model_metrics_baseline.json
          fi
          PYTHONPATH=".:models:analyzers:utils:scrapers" python3 models/train_xgboost_model.py
          if [ -f "xgb_nhl_model.json" ]; then
             echo "✅ Model retrained successfully"
          else
             echo "⚠️ Model training failed or didn't save (accuracy threshold not met?)"
          fi

      - name: Upload model artifacts (Actions artifact)
        if: steps.check_date.outputs.should_run == 'true' && steps.outcomes.outputs.outcomes_updated != '0'
        uses: actions/upload-artifact@v4
        with:
          name: nhl-model-artifacts
          if-no-files-found: warn
          path: |
            xgb_nhl_model*.json
            xgb_calibrated_model*.pkl
            xgb_features*.pkl
            model_feature_snapshot.json
            xgb_prob_calibration.json
            team_encodings*.json
            meta_confidence_model.pkl
            margin_regression_model.pkl
            p1_outcome_model.pkl
            total_goals_model.pkl
            home_goals_model.pkl
            away_goals_model.pkl
            scoreline_calibration.json
            model_metrics.json

      - name: "Guardrail: scoreline metrics must not regress"
        if: steps.check_date.outputs.should_run == 'true' && steps.outcomes.outputs.outcomes_updated != '0'
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          cur_p = Path("model_metrics.json")
          if not cur_p.exists():
              raise SystemExit("model_metrics.json missing after retrain")
          cur = json.loads(cur_p.read_text())
          # Baseline captured before retrain. If missing, don't fail.
          base_p = Path("/tmp/model_metrics_baseline.json")
          base = None
          try:
              base = json.loads(base_p.read_text())
          except Exception:
              base = None

          def f(x):
              try:
                  return float(x)
              except Exception:
                  return None

          # Only enforce if we have both baseline and current numeric values.
          # Allow tiny noise: MAE +0.05, within_1 -0.02.
          checks = []
          for key, direction, tol in [
              ("home_goals_mae", "lower", 0.05),
              ("away_goals_mae", "lower", 0.05),
              ("total_goals_mae", "lower", 0.05),
              ("total_goals_within_1", "higher", 0.02),
          ]:
              c = f(cur.get(key))
              b = f(base.get(key)) if isinstance(base, dict) else None
              if c is None or b is None:
                  continue
              if direction == "lower" and c > b + tol:
                  checks.append(f"{key} regressed: {c:.3f} > {b:.3f}+{tol}")
              if direction == "higher" and c < b - tol:
                  checks.append(f"{key} regressed: {c:.3f} < {b:.3f}-{tol}")

          if checks:
              raise SystemExit("Scoreline guardrail failed: " + " | ".join(checks))
          print("Scoreline guardrail OK")
          PY

      - name: "Guardrail: calibration must not regress"
        if: steps.check_date.outputs.should_run == 'true' && steps.outcomes.outputs.outcomes_updated != '0'
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          cur_p = Path("model_metrics.json")
          if not cur_p.exists():
              raise SystemExit("model_metrics.json missing after retrain")
          cur = json.loads(cur_p.read_text())
          base_p = Path("/tmp/model_metrics_baseline.json")
          base = json.loads(base_p.read_text()) if base_p.exists() else {}

          def f(x):
              try:
                  return float(x)
              except Exception:
                  return None

          # Prefer calibrated metrics when present. Allow small noise: Brier +0.003, ECE +0.005.
          checks = []
          keys = [("xgb_recent_brier_cal", 0.003), ("xgb_recent_ece_cal", 0.005)]
          if f(cur.get("xgb_recent_brier_cal")) is None:
              keys = [("xgb_recent_brier", 0.003), ("xgb_recent_ece", 0.005)]
          for key, tol in keys:
              c = f(cur.get(key))
              b = f(base.get(key))
              if c is None or b is None:
                  continue
              if c > b + tol:
                  checks.append(f"{key} regressed: {c:.4f} > {b:.4f}+{tol}")
          if checks:
              raise SystemExit("Calibration guardrail failed: " + " | ".join(checks))
          print("Calibration guardrail OK")
          PY

      - name: Run daily predictions
        if: steps.check_date.outputs.should_run == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          echo "🎯 RUNNING DAILY PREDICTIONS WITH META-ENSEMBLE"
          echo "All data collected, now making predictions..."
          # Ensure model artifacts exist even on non-retrain days.
          if [ ! -f "xgb_calibrated_model.pkl" ] && [ -n "${GITHUB_TOKEN}" ]; then
            python3 scripts/download_latest_model_artifact.py || true
          fi
          PYTHONPATH=".:models:analyzers:utils:scrapers" python3 daily_prediction_notifier.py

      - name: Smoke test (imports + prediction schema)
        if: steps.check_date.outputs.should_run == 'true'
        run: |
          PYTHONPATH=".:models:analyzers:utils:scrapers" python3 -m pytest -q tests/test_smoke_daily_predictions.py

      - name: "Guardrail: ensure we don't use XGB when worse than Elo"
        if: steps.check_date.outputs.should_run == 'true'
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          p = Path("model_performance.json")
          if not p.exists():
              raise SystemExit("model_performance.json missing (guardrail)")
          perf = json.loads(p.read_text())
          x_ll = perf.get("xgb_recent_logloss") or perf.get("xgb_cal_mean_logloss")
          e_ll = perf.get("elo_recent_logloss") or perf.get("elo_mean_logloss")
          if x_ll is None or e_ll is None:
              print("Guardrail skipped: missing logloss fields")
              raise SystemExit(0)
          gap = float(x_ll) - float(e_ll)
          margin = 0.01
          if gap > margin:
              # When XGB is worse, require that today's saved predictions indicate Elo-champion mode.
              hist = Path("data/win_probability_predictions_v2.json")
              if not hist.exists():
                  hist = Path("win_probability_predictions_v2.json")
              if not hist.exists():
                  raise SystemExit("Guardrail failed: predictions history missing")
              d = json.loads(hist.read_text())
              preds = d.get("predictions", [])
              if not preds:
                  raise SystemExit("Guardrail failed: no predictions in history")
              today = preds[-1].get("date")
              todays = [r for r in preds if r.get("date") == today]
              if not todays:
                  raise SystemExit("Guardrail failed: could not find today's predictions in history")
              bad = []
              for r in todays:
                  mode = r.get("ensemble_mode")
                  w = (r.get("ensemble_weights") or {})
                  if mode != "elo_champion" or float(w.get("xgb", 1.0)) != 0.0:
                      bad.append((r.get("game_id"), mode, w.get("xgb")))
              if bad:
                  raise SystemExit(f\"Guardrail failed: xgb worse by {gap:.4f} but found non-elo-champion rows: {bad[:5]}\")
          print(f\"Guardrail OK (gap={gap:+.4f})\")
          PY

      - name: Commit predictions and edge data changes
        if: steps.check_date.outputs.should_run == 'true'
        run: |
          git config user.email "action@github.com"
          git config user.name "github-actions[bot]"
          
          # Track files to commit
          FILES_TO_COMMIT=""
          
          # Add nhl_edge_data.json if it exists (in data dir)
          if [ -f "data/nhl_edge_data.json" ]; then
            echo "📦 Force adding nhl_edge_data.json..."
            git add --force data/nhl_edge_data.json
            FILES_TO_COMMIT="$FILES_TO_COMMIT data/nhl_edge_data.json"
            echo "✅ nhl_edge_data.json added"
          else
            echo "⚠️  nhl_edge_data.json not found in data/"
          fi
          
          # Add win_probability_predictions_v2.json if it exists (in data dir)
          if [ -f "data/win_probability_predictions_v2.json" ]; then
            echo "📦 Adding win_probability_predictions_v2.json..."
            git add --force data/win_probability_predictions_v2.json
            FILES_TO_COMMIT="$FILES_TO_COMMIT data/win_probability_predictions_v2.json"
            echo "✅ win_probability_predictions_v2.json added"
          else
            echo "⚠️  win_probability_predictions_v2.json not found in data/"
          fi

          # Commit minimal tracked metrics on retrain days (used by guardrails).
          if [ "${{ steps.outcomes.outputs.outcomes_updated }}" != "0" ] && [ -f "model_metrics.json" ]; then
            echo "📦 Adding model_metrics.json (retrain day)..."
            git add --force model_metrics.json
            FILES_TO_COMMIT="$FILES_TO_COMMIT model_metrics.json"
          fi
          
          # Add season_2025_2026_team_stats.json if it exists
          if [ -f "data/season_2025_2026_team_stats.json" ]; then
            echo "📦 Adding season_2025_2026_team_stats.json..."
            git add --force data/season_2025_2026_team_stats.json
            FILES_TO_COMMIT="$FILES_TO_COMMIT data/season_2025_2026_team_stats.json"
            echo "✅ season_2025_2026_team_stats.json added"
          else
            echo "⚠️  season_2025_2026_team_stats.json not found in data/"
          fi

          # Add advanced goalie and team metrics
          if [ -f "data/goalie_stats.json" ]; then
            echo "📦 Adding goalie_stats.json..."
            git add --force data/goalie_stats.json
            FILES_TO_COMMIT="$FILES_TO_COMMIT data/goalie_stats.json"
          fi
          if [ -f "data/team_advanced_metrics.json" ]; then
            echo "📦 Adding team_advanced_metrics.json..."
            git add --force data/team_advanced_metrics.json
            FILES_TO_COMMIT="$FILES_TO_COMMIT data/team_advanced_metrics.json"
          fi

          # Model artifacts are uploaded as Actions artifacts by default (not committed).

          # Append-only events (schema-stable training store)
          if [ -f "data/prediction_events.jsonl" ]; then
            git add --force data/prediction_events.jsonl
            FILES_TO_COMMIT="$FILES_TO_COMMIT data/prediction_events.jsonl"
          fi
          if [ -f "data/outcome_events.jsonl" ]; then
            git add --force data/outcome_events.jsonl
            FILES_TO_COMMIT="$FILES_TO_COMMIT data/outcome_events.jsonl"
          fi

          if [ -f "team_travel_archetypes.json" ]; then
             echo "📦 Adding travel archetypes..."
             git add --force team_travel_archetypes.json
             FILES_TO_COMMIT="$FILES_TO_COMMIT team_travel_archetypes.json"
          fi
          
          # Commit if there are changes
          if ! git diff --staged --quiet; then
            echo "📝 Committing updated predictions, edge data, and team stats..."
            git commit -m "Update daily NHL predictions, edge data, and team stats - $(date -u +'%Y-%m-%d')"
            echo "✅ Committed:$FILES_TO_COMMIT"
          else
            echo "ℹ️  No changes to commit (files are up to date)"
          fi
      - name: Push edge data changes
        if: always() && steps.check_date.outputs.should_run == 'true'
        run: |
          # Only push if there are local commits ahead of origin
          git fetch origin main
          AHEAD=$(git rev-list --count origin/main..HEAD || echo 0)
          if [ "$AHEAD" -gt 0 ]; then
            git pull --rebase --autostash origin main
            git push origin HEAD:main
          else
            echo "No edge data changes to push"
          fi
