name: TV Timeout PP + 5v5 OZ Study

on:
  workflow_dispatch:
    inputs:
      window_sec:
        description: "Window in seconds (default 60)"
        required: false
        default: "60"
      max_games:
        description: "If >0, limit games per season (debug)"
        required: false
        default: "0"
      season_start_years:
        description: "Space-separated season start years (e.g. '2023 2024 2025'). Blank = last 3."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  run-study:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-py310-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-py310-
            ${{ runner.os }}-pip-

      - name: Cache NHL PBP downloads
        uses: actions/cache@v4
        with:
          path: .cache/nhl_tv_timeout_pp
          key: ${{ runner.os }}-nhl-tv-timeout-pp-study-v1
          restore-keys: |
            ${{ runner.os }}-nhl-tv-timeout-pp-study-
            ${{ runner.os }}-nhl-tv-timeout-pp-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run study
        env:
          WINDOW_SEC: ${{ github.event.inputs.window_sec }}
        run: |
          set -e
          ARGS=""
          if [ "${{ github.event.inputs.max_games }}" != "0" ]; then
            ARGS="$ARGS --max-games ${{ github.event.inputs.max_games }}"
          fi
          if [ -n "${{ github.event.inputs.season_start_years }}" ]; then
            ARGS="$ARGS --season-start-years ${{ github.event.inputs.season_start_years }}"
          fi
          python3 scripts/run_tv_timeout_pp_study.py $ARGS

      - name: Upload summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: tv-timeout-pp-study
          if-no-files-found: error
          path: |
            data/tv_timeout_pp_summary.json

