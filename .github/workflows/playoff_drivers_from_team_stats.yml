name: Playoff Drivers from Team Stats JSON

on:
  workflow_dispatch:
    inputs:
      playoff_start_date:
        description: "YYYY-MM-DD cutoff date (inclusive)"
        required: false
        default: "2026-04-18"
      max_games:
        description: "If >0, limit playoff games analyzed (debug)"
        required: false
        default: "0"

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-py310-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-py310-
            ${{ runner.os }}-pip-

      - name: Cache NHL API downloads
        uses: actions/cache@v4
        with:
          path: .cache/nhl_playoff_drivers_team_stats
          key: ${{ runner.os }}-nhl-playoff-drivers-team-stats-v1
          restore-keys: |
            ${{ runner.os }}-nhl-playoff-drivers-team-stats-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Analyze drivers
        run: |
          ARGS="--playoff-start-date ${{ github.event.inputs.playoff_start_date }}"
          if [ "${{ github.event.inputs.max_games }}" != "0" ]; then
            ARGS="$ARGS --max-games ${{ github.event.inputs.max_games }}"
          fi
          python3 scripts/analyze_playoff_drivers_from_team_stats_json.py $ARGS

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: playoff-drivers-team-stats
          if-no-files-found: error
          path: |
            data/playoff_drivers_from_team_stats.json

