name: Auto Post NHL Reports

on:
  schedule:
    # GitHub Actions cron is UTC.
    #
    # Desired schedule (CT):
    # - Weekends: 12:00 PM - 11:59 PM
    # - Weekdays: keep existing night schedule (8:00 PM - 2:00 AM)
    #
    # NOTE: CT is either CST (UTC-6) or CDT (UTC-5). These crons are correct for CDT.
    # If you want to pin to CST year-round, we can adjust to UTC-6 instead.
    #
    # Weekdays (Mon-Fri): 8:00 PM - 2:59 AM CT  ==> 01:00 - 07:59 UTC
    - cron: '*/10 1-7 * * 1-5'
    #
    # Weekends (Sat/Sun): 12:00 PM - 11:59 PM CT ==> 17:00 - 04:59 UTC
    # Because this window crosses midnight UTC, it requires two crons:
    # - Sat/Sun 17:00-23:59 UTC covers Sat/Sun afternoon-evening CT
    - cron: '*/10 17-23 * * 6,0'
    # - Sun/Mon 00:00-04:59 UTC covers Sat/Sun late evening CT
    - cron: '*/10 0-4 * * 0,1'
  repository_dispatch:  # Allow external triggers (instant when game finishes)
    types: [game-finished]  # Custom event type from game monitor
  workflow_dispatch:  # Allow manual triggering from Actions tab
    inputs:
      force_reprocess_days:
        description: "Replay last N days even if already processed (e.g. 2)"
        required: false
        default: "0"
      allow_twitter_failure:
        description: "If true, do not fail run when X post fails"
        required: false
        default: "false"
      require_twitter_post:
        description: "If false, do not require X post for a game to count as processed"
        required: false
        default: "true"

jobs:
  check-and-post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write  # Allow workflow to commit and push
    
    steps:
    - name: Check Season Resume Date
      run: |
        current_date=$(date +%Y-%m-%d)
        target_date="2026-02-25"
        if [[ "$current_date" < "$target_date" ]]; then
          echo "⏸️  Olympic Break: Current date $current_date is before resume date $target_date."
          echo "Skipping workflow."
          echo "should_run=false" >> $GITHUB_OUTPUT
        else
          echo "✅ Season Resumed!"
          echo "should_run=true" >> $GITHUB_OUTPUT
        fi
      id: check_date
      
    - name: Checkout repository
      if: steps.check_date.outputs.should_run == 'true'
      uses: actions/checkout@v6
      with:
        fetch-depth: 0  # Fetch all history to ensure we have the latest commits
    

    
    - name: Set up Python
      if: steps.check_date.outputs.should_run == 'true'
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      if: steps.check_date.outputs.should_run == 'true'
      run: |
        sudo apt-get update
        sudo apt-get install -y poppler-utils
    
    - name: Install dependencies
      if: steps.check_date.outputs.should_run == 'true'
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Pull latest changes (ensure we have latest processed_games.json)
      if: steps.check_date.outputs.should_run == 'true'
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "GitHub Actions Bot"
        # Pull latest to get any updates to processed_games.json from previous runs
        git pull --rebase origin main || git pull origin main || true
        # Ensure processed_games.json exists
        if [ ! -f processed_games.json ]; then
          echo '{"games": []}' > processed_games.json
          git add -f processed_games.json
        fi
        echo "📋 Current processed_games.json status:"
        if [ -f processed_games.json ]; then
          cat processed_games.json || echo "  (file exists but could not read)"
        else
          echo "  (file does not exist)"
        fi
    
    - name: Check for completed games and post
      if: steps.check_date.outputs.should_run == 'true'
      env:
        TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
        TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
        TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
        TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        FORCE_REPROCESS_DAYS: ${{ github.event.inputs.force_reprocess_days || '0' }}
        ALLOW_TWITTER_FAILURE: ${{ github.event.inputs.allow_twitter_failure || 'false' }}
        REQUIRE_TWITTER_POST: ${{ github.event.inputs.require_twitter_post || 'true' }}
      run: |
        python3 github_actions_runner.py
    
    - name: Commit processed games, team stats, and model learning data
      if: steps.check_date.outputs.should_run == 'true'
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "GitHub Actions Bot"
        
        # Pull latest changes to avoid conflicts (multiple runs overlap)
        git pull --rebase --autostash origin main || true
        
        # Ensure processed_games.json exists (create empty if missing)
        if [ ! -f processed_games.json ]; then
          echo '{"games": []}' > processed_games.json
        fi
        
        # Force add files that are in .gitignore but need to be tracked
        # Team stats is updated by daily predictions workflow at 6am CT, so we just commit it if it exists
        if [ -f "season_2025_2026_team_stats.json" ]; then
          git add -f season_2025_2026_team_stats.json
        fi
        # Add other files
        if [ -f "processed_games.json" ]; then
          git add -f processed_games.json
        fi
        if [ -f "win_probability_predictions_v2.json" ]; then
          git add -f win_probability_predictions_v2.json
        fi
        if [ -f "posted_tweets.json" ]; then
          git add -f posted_tweets.json
        fi
        if [ -f "data/goalie_stats.json" ]; then
          git add -f data/goalie_stats.json
        fi
        if [ -f "data/team_advanced_metrics.json" ]; then
          git add -f data/team_advanced_metrics.json
        fi
        
        # Check if there are changes to commit
        if ! git diff --staged --quiet; then
          echo "📝 Committing updated tracking files..."
          git commit -m "Update processed games, team stats, and model learning data [skip ci]"
          # Push with retry (handles concurrent pushes)
          for i in 1 2 3; do
            if git push origin HEAD:main; then
              echo "✅ Successfully committed and pushed tracking files"
              break
            fi
            echo "⚠️  Push failed (attempt $i). Rebasing and retrying..."
            git pull --rebase --autostash origin main || true
            sleep 2
          done
        else
          echo "ℹ️  No changes to commit (files are up to date)"
        fi
        
        # Verify the file is tracked in git
        if git ls-files --error-unmatch processed_games.json > /dev/null 2>&1; then
          echo "✅ processed_games.json is tracked in git"
        else
          echo "⚠️  WARNING: processed_games.json is not tracked in git!"
        fi
