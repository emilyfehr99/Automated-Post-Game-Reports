name: Backfill X Playoff Posts

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "First date to backfill (YYYY-MM-DD)"
        required: false
        default: "2026-04-23"
      post_delay_seconds:
        description: "Seconds between X posts (rate limit safety)"
        required: false
        default: "45"

jobs:
  backfill-x:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      BACKFILL_X_PLAYOFFS: "true"
      BACKFILL_START_DATE: ${{ github.event.inputs.start_date || '2026-04-23' }}
      X_POST_DELAY_SECONDS: ${{ github.event.inputs.post_delay_seconds || '45' }}
      SKIP_DISCORD_POST: "true"
      X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
      X_CT0: ${{ secrets.X_CT0 }}
      X_POST_MODE: cookie
      REQUIRE_TWITTER_POST: "true"
      ALLOW_TWITTER_FAILURE: "false"
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - uses: actions/setup-python@v6
      with:
        python-version: "3.10"

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y poppler-utils

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Pull latest tracking files
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "GitHub Actions Bot"
        git pull --rebase origin main || true

    - name: Backfill missing playoff posts to X
      run: python3 github_actions_runner.py

    - name: Commit tracking files
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "GitHub Actions Bot"
        git pull --rebase --autostash origin main || true
        for f in processed_games.json posted_tweets.json season_2025_2026_team_stats.json win_probability_predictions_v2.json; do
          if [ -f "$f" ]; then git add -f "$f"; fi
        done
        if ! git diff --staged --quiet; then
          git commit -m "Backfill X playoff posts [skip ci]"
          for i in 1 2 3; do
            git push origin HEAD:main && break
            git pull --rebase --autostash origin main || true
            sleep 2
          done
        fi
