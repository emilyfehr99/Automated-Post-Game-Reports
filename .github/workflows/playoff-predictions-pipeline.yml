# One-click pipeline: optional 5-season label rebuild → train round + Cup models
# → export current team features / priors → Monte Carlo bracket sim → optional commit.
#
# Requires data/reg_season_cup_5yr.json (or .csv) in the repo unless rebuild_dataset is enabled.
# Optional: data/historical/<season>/team_season_aggregate.json for richer microstats in training.
# Simulator uses data/team_advanced_metrics.json and related files (same as local runs).

name: Playoff predictions pipeline

on:
  workflow_dispatch:
    inputs:
      rebuild_dataset:
        description: "Run build_regular_season_cup_dataset_5yr.py (slow; hits NHL API)"
        type: boolean
        default: false
      iterations:
        description: "Monte Carlo iterations for simulate_2026_playoffs_master.py"
        type: string
        default: "200000"
      season:
        description: "Season string for playoff-series carousel (e.g. 20252026)"
        type: string
        default: "20252026"
      commit_push:
        description: "Commit and push generated JSON artifacts"
        type: boolean
        default: true
  # Also run when playoff-related code lands on main (inputs only exist for workflow_dispatch; steps use defaults below).
  push:
    branches: [main]
    paths:
      - ".github/workflows/playoff-predictions-pipeline.yml"
      - "scripts/simulate_2026_playoffs_master.py"
      - "scripts/train_regular_season_playoff_round_models_5yr.py"
      - "scripts/train_regular_season_cup_model_5yr.py"
      - "models/playoff_predictor.py"

permissions:
  contents: write

concurrency:
  group: playoff-predictions-pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pipeline:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify 5-season dataset is present
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.rebuild_dataset) }}
        run: |
          if [ ! -f data/reg_season_cup_5yr.json ] && [ ! -f data/reg_season_cup_5yr.csv ]; then
            echo "::error::Missing data/reg_season_cup_5yr.json (or .csv). Commit it from scripts/build_regular_season_cup_dataset_5yr.py or re-run this workflow with rebuild_dataset enabled."
            exit 1
          fi

      - name: Rebuild 5-season regular-season + playoff labels (optional)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.rebuild_dataset }}
        run: |
          echo "=== Rebuilding reg_season_cup_5yr dataset ==="
          python3 scripts/build_regular_season_cup_dataset_5yr.py

      - name: Train playoff round-depth models
        run: |
          echo "=== train_regular_season_playoff_round_models_5yr.py ==="
          python3 scripts/train_regular_season_playoff_round_models_5yr.py

      - name: Train Cup model + export priors and team feature rows
        run: |
          echo "=== train_regular_season_cup_model_5yr.py ==="
          python3 scripts/train_regular_season_cup_model_5yr.py

      - name: Run bracket Monte Carlo and export predictions JSON
        run: |
          set -e
          IT='${{ inputs.iterations }}'
          [ -z "$IT" ] && IT="200000"
          SEASON='${{ inputs.season }}'
          [ -z "$SEASON" ] && SEASON="20252026"
          echo "=== simulate_2026_playoffs_master.py (iterations=${IT}, season=${SEASON}) ==="
          python3 scripts/simulate_2026_playoffs_master.py \
            --iterations "$IT" \
            --season "$SEASON" \
            --bracket-out data/official_2026_bracket_current.json \
            --predictions-out data/playoff_predictions_2026.json

      - name: Commit and push artifacts
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.commit_push }}
        run: |
          set -e
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"

          for f in \
            data/reg_season_cup_5yr.json \
            data/reg_season_cup_5yr.csv \
            data/reg_season_cup_model_5yr.json \
            data/cup_prior_current.json \
            data/reg_season_team_features_current.json \
            data/reg_season_playoff_round_models_5yr.json \
            data/playoff_predictions_2026.json \
            data/playoff_series_all.csv \
            data/series_winners_2026.json \
            data/official_2026_bracket_current.json
          do
            if [ -f "$f" ]; then
              git add -f "$f"
              echo "staged: $f"
            fi
          done

          if git diff --staged --quiet; then
            echo "No artifact changes to commit."
          else
            git commit -m "data: playoff pipeline — models + predictions [skip ci]"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin "${{ github.ref_name }}"
          fi
