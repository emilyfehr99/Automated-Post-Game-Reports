<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NHL Playoff Bracket Predictions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
            font-weight: 400;
            letter-spacing: -0.01em;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: #ffffff;
            margin-bottom: 40px;
            padding: 20px 0;
            border-bottom: 2px solid #333;
        }

        header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 3.5em;
            margin-bottom: 15px;
            text-shadow: 0 2px 20px rgba(200,16,46,0.4);
            letter-spacing: -0.02em;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #c8102e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .nav-links a {
            color: #888;
            text-decoration: none;
            font-size: 1.1em;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: #c8102e;
        }

        .nav-links a.active {
            color: #c8102e;
            font-weight: 600;
        }

        .refresh-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #1a1a1a;
            color: #fff;
            border: 2px solid #333;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 600;
            transition: all 0.2s;
            z-index: 100;
        }

        .refresh-btn:hover {
            background: #2a2a2a;
            border-color: #555;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #888;
            font-size: 1.2em;
        }

        .error {
            background: #2a1a1a;
            border: 2px solid #c8102e;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
            color: #ff6b6b;
        }

        .standings-section {
            background: linear-gradient(180deg, #1a1a1a 0%, #0f0f0f 100%);
            border: 2px solid #333;
            border-radius: 12px;
            padding: 30px;
            margin: 30px 0;
        }

        .standings-section h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2em;
            margin-bottom: 10px;
            color: #fff;
        }

        .standings-section p {
            color: #888;
            margin-bottom: 20px;
        }

        .standings-table {
            width: 100%;
            border-collapse: collapse;
        }

        .standings-table th {
            text-align: left;
            padding: 12px;
            border-bottom: 2px solid #333;
            color: #c8102e;
            font-weight: 600;
        }

        .standings-table td {
            padding: 12px;
            border-bottom: 1px solid #222;
        }

        .standings-table tr:hover {
            background: #151515;
        }
    </style>
</head>
<body>
    <button class="refresh-btn" onclick="loadPredictions()">🔄 Refresh</button>
    
    <div class="container">
        <header>
            <h1>🏆 Playoff Predictions</h1>
            <div class="nav-links">
                <a href="/">Daily Predictions</a>
                <a href="/playoffs" class="active">Playoff Probabilities</a>
            </div>
        </header>

        <div id="loading" class="loading">Loading playoff probabilities...</div>
        <div id="error" class="error" style="display: none;"></div>
        <div id="content" style="display: none;">
            <div class="standings-section">
                <h3>2026 Stanley Cup Bracket Forecast</h3>
                <p>Round 1 series win probabilities + round advancement odds (Monte Carlo bracket simulation)</p>
                <div id="bracket-meta" style="margin: 10px 0 20px; color: #888; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;"></div>
                <div id="round1-content"></div>
                <div style="height: 24px;"></div>
                <div id="cup-odds-content"></div>
                <div style="height: 24px;"></div>
                <div id="path-content"></div>
                <div style="height: 24px;"></div>
                <div id="regseason-content"></div>
            </div>
        </div>
    </div>

    <script>
        function pct(x) {
            if (typeof x !== 'number') return '—';
            return `${(x * 100).toFixed(1)}%`;
        }

        async function loadPredictions() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const content = document.getElementById('content');

            loading.style.display = 'block';
            error.style.display = 'none';
            content.style.display = 'none';

            try {
                const bracketResponse = await fetch('/api/playoffs/bracket');
                const bracketJson = await bracketResponse.json();

                if (!bracketJson.success) {
                    throw new Error(bracketJson.error || 'Failed to load playoff bracket predictions');
                }

                displayBracketPredictions(bracketJson.data);

                loading.style.display = 'none';
                content.style.display = 'block';
            } catch (err) {
                console.error('Error loading predictions:', err);
                loading.style.display = 'none';
                error.style.display = 'block';
                error.textContent = `Error: ${err.message}`;
            }
        }

        function displayBracketPredictions(data) {
            const metaEl = document.getElementById('bracket-meta');
            const r1El = document.getElementById('round1-content');
            const cupEl = document.getElementById('cup-odds-content');
            const pathEl = document.getElementById('path-content');
            const regEl = document.getElementById('regseason-content');

            if (!data || !data.round1_series_odds || !data.advancement_probabilities) {
                metaEl.textContent = '';
                r1El.innerHTML = '<p style="color:#888;">No bracket prediction data available.</p>';
                cupEl.innerHTML = '';
                pathEl.innerHTML = '';
                regEl.innerHTML = '';
                return;
            }

            const meta = data.meta || {};
            metaEl.textContent = `generated_at_utc=${meta.generated_at_utc || 'unknown'} • iterations=${meta.iterations || '—'} • season=${meta.season || '—'}`;

            const east = (data.round1_series_odds.East || []);
            const west = (data.round1_series_odds.West || []);
            const adv = (data.advancement_probabilities || []).slice().sort((a, b) => (b.cup || 0) - (a.cup || 0));

            r1El.innerHTML = `
                <h4 style="color:#c8102e; margin-top: 10px; margin-bottom: 10px;">Round 1 Series Odds</h4>
                ${createSeriesTable('Eastern Conference', east)}
                <div style="height: 18px;"></div>
                ${createSeriesTable('Western Conference', west)}
            `;

            cupEl.innerHTML = `
                <h4 style="color:#c8102e; margin-top: 10px; margin-bottom: 10px;">Cup Odds + Advancement</h4>
                ${createCupOddsTable(adv)}
            `;

            const path = data.path_difficulty || {};
            const oppPaths = data.opponent_paths || {};
            pathEl.innerHTML = `
                <h4 style="color:#c8102e; margin-top: 10px; margin-bottom: 10px;">Path to Cup Difficulty</h4>
                <p style="color:#888; margin-bottom: 10px;">
                    Difficulty index = sum of expected \\(-\\ln(P(Win Series))\\) across rounds based on likely opponents.
                    Higher = harder path.
                </p>
                ${createPathDifficultyTable(adv, path, oppPaths)}
            `;

            // Kick off regular-season -> Cup model section (async)
            loadRegSeasonCupModel(regEl);
        }

        function createSeriesTable(title, series) {
            if (!series || series.length === 0) {
                return `<p style="color:#888;">No series data for ${title}.</p>`;
            }

            const rows = series.map(s => {
                const cs = s.current_wins || {};
                const score = `${s.away} ${cs.away ?? 0} - ${cs.home ?? 0} ${s.home}`;
                const fav = (s.home_series_win_prob ?? 0) >= (s.away_series_win_prob ?? 0) ? s.home : s.away;
                const favPct = Math.max(s.home_series_win_prob ?? 0, s.away_series_win_prob ?? 0);
                return `
                    <tr>
                        <td style="font-weight:700; color:#fff;">${s.label || 'R1'}</td>
                        <td>${score}</td>
                        <td style="color:#c8102e; font-weight:700;">${fav}</td>
                        <td>${pct(favPct)}</td>
                        <td>${pct(s.away_series_win_prob)}</td>
                        <td>${pct(s.home_series_win_prob)}</td>
                        <td>${typeof s.avg_remaining_games === 'number' ? s.avg_remaining_games.toFixed(1) : '—'}</td>
                    </tr>
                `;
            }).join('');

            return `
                <div style="margin: 10px 0 10px; color:#fff; font-weight:700;">${title}</div>
                <table class="standings-table">
                    <thead>
                        <tr>
                            <th>Series</th>
                            <th>Current</th>
                            <th>Projected</th>
                            <th>Win%</th>
                            <th>Away win%</th>
                            <th>Home win%</th>
                            <th>Avg games left</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            `;
        }

        function createCupOddsTable(rows) {
            if (!rows || rows.length === 0) {
                return '<p style="color:#888;">No advancement data available.</p>';
            }

            const top = rows.slice(0, 16);
            const body = top.map((r, idx) => `
                <tr>
                    <td style="font-weight:700; color:#fff;">${idx + 1}</td>
                    <td style="font-weight:800; color:#fff;">${r.team}</td>
                    <td>${pct(r.r2)}</td>
                    <td>${pct(r.r3)}</td>
                    <td>${pct(r.fin)}</td>
                    <td style="color:#c8102e; font-weight:800;">${pct(r.cup)}</td>
                </tr>
            `).join('');

            return `
                <table class="standings-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Team</th>
                            <th>Make R2</th>
                            <th>Make CF</th>
                            <th>Make Final</th>
                            <th>Win Cup</th>
                        </tr>
                    </thead>
                    <tbody>${body}</tbody>
                </table>
            `;
        }

        function topOpponents(dist, k=3) {
            if (!dist) return [];
            return Object.entries(dist)
                .sort((a, b) => (b[1] || 0) - (a[1] || 0))
                .slice(0, k);
        }

        function fmtOppList(list) {
            if (!list || list.length === 0) return '—';
            return list.map(([t, p]) => `${t} ${(p * 100).toFixed(0)}%`).join(', ');
        }

        function createPathDifficultyTable(advRows, path, oppPaths) {
            const teams = (advRows || []).slice().sort((a, b) => {
                const ia = path?.[a.team]?.index ?? Infinity;
                const ib = path?.[b.team]?.index ?? Infinity;
                return ia - ib;
            }).slice(0, 16);

            const body = teams.map((r, idx) => {
                const t = r.team;
                const p = path?.[t] || {};
                const idxVal = (typeof p.index === 'number') ? p.index.toFixed(3) : '—';

                const r2Opp = fmtOppList(topOpponents(oppPaths?.["2"]?.[t]));
                const r3Opp = fmtOppList(topOpponents(oppPaths?.["3"]?.[t]));
                const r4Opp = fmtOppList(topOpponents(oppPaths?.["4"]?.[t]));

                const r2d = p.by_round?.["2"]?.expected_neglog_p;
                const r3d = p.by_round?.["3"]?.expected_neglog_p;
                const r4d = p.by_round?.["4"]?.expected_neglog_p;

                const fmtD = (x) => (typeof x === 'number') ? x.toFixed(3) : '—';

                return `
                    <tr>
                        <td style="font-weight:700; color:#fff;">${idx + 1}</td>
                        <td style="font-weight:800; color:#fff;">${t}</td>
                        <td style="color:#c8102e; font-weight:800;">${idxVal}</td>
                        <td>${fmtD(r2d)}</td>
                        <td>${fmtD(r3d)}</td>
                        <td>${fmtD(r4d)}</td>
                        <td>${r2Opp}</td>
                        <td>${r3Opp}</td>
                        <td>${r4Opp}</td>
                    </tr>
                `;
            }).join('');

            return `
                <table class="standings-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Team</th>
                            <th>Difficulty</th>
                            <th>R2 Δ</th>
                            <th>CF Δ</th>
                            <th>Final Δ</th>
                            <th>Likely R2 Opp</th>
                            <th>Likely CF Opp</th>
                            <th>Likely Final Opp</th>
                        </tr>
                    </thead>
                    <tbody>${body}</tbody>
                </table>
            `;
        }

        async function loadRegSeasonCupModel(containerEl) {
            try {
                const r = await fetch('/api/playoffs/reg-season-cup-model');
                const j = await r.json();
                if (!j.success) {
                    containerEl.innerHTML = `<p style="color:#888;">Regular-season model unavailable: ${j.error || 'unknown error'}</p>`;
                    return;
                }
                containerEl.innerHTML = `
                    <h4 style="color:#c8102e; margin-top: 10px; margin-bottom: 10px;">Regular Season → Cup Success (Last 5 Seasons)</h4>
                    <div style="color:#888; margin-bottom: 10px;">
                        Trained on 5 seasons of final standings features; used as a light prior in series simulations.
                    </div>
                    ${renderCupModelTable(j.model)}
                    <div style="height: 16px;"></div>
                    ${renderCurrentCupPriors(j.priors)}
                `;
            } catch (e) {
                containerEl.innerHTML = `<p style="color:#888;">Regular-season model unavailable.</p>`;
            }
        }

        function renderCupModelTable(model) {
            const coef = model?.logistic?.coef || {};
            const rows = Object.entries(coef)
                .sort((a, b) => Math.abs(b[1] || 0) - Math.abs(a[1] || 0))
                .map(([feat, w]) => `
                    <tr>
                        <td style="font-weight:700; color:#fff;">${feat}</td>
                        <td style="color:#c8102e; font-weight:800;">${(w >= 0 ? '+' : '') + Number(w).toFixed(3)}</td>
                    </tr>
                `).join('');

            const ranks = (model?.winner_rank_by_season || []).map(x => `
                <tr>
                    <td style="font-weight:700; color:#fff;">${x.season}</td>
                    <td>${x.winner_rank ?? '—'}</td>
                </tr>
            `).join('');

            return `
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 18px;">
                    <div>
                        <div style="color:#fff; font-weight:800; margin-bottom: 8px;">Model Coefficients (standardized)</div>
                        <table class="standings-table">
                            <thead><tr><th>Feature</th><th>Weight</th></tr></thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>
                    <div>
                        <div style="color:#fff; font-weight:800; margin-bottom: 8px;">How it ranked the actual Cup winner</div>
                        <table class="standings-table">
                            <thead><tr><th>Season</th><th>Winner rank</th></tr></thead>
                            <tbody>${ranks}</tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function renderCurrentCupPriors(priors) {
            const teams = priors?.teams || {};
            const rows = Object.entries(teams)
                .sort((a, b) => (b[1]?.cup_prior_norm || 0) - (a[1]?.cup_prior_norm || 0))
                .slice(0, 12)
                .map(([team, d], i) => `
                    <tr>
                        <td style="font-weight:700; color:#fff;">${i + 1}</td>
                        <td style="font-weight:800; color:#fff;">${team}</td>
                        <td style="color:#c8102e; font-weight:800;">${pct(d.cup_prior_norm)}</td>
                        <td>${Number(d.points_pct || 0).toFixed(3)}</td>
                        <td>${d.goal_diff ?? '—'}</td>
                        <td>${d.league_rank_points ?? '—'}</td>
                    </tr>
                `).join('');

            return `
                <div style="color:#fff; font-weight:800; margin-bottom: 8px;">Current-season Cup priors (top 12)</div>
                <table class="standings-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Team</th>
                            <th>Cup prior</th>
                            <th>Pts%</th>
                            <th>GD</th>
                            <th>Pts rank</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            `;
        }

        loadPredictions();
    </script>
</body>
</html>
